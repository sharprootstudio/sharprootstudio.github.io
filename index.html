<!DOCTYPE html>
<html>
<head>
    <title>SR Studio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        header {
            padding: 50px 20px;
        }

        h1 {
            font-size: 40px;
            color: #38bdf8;
        }

        p {
            font-size: 18px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: #38bdf8;
            color: black;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .section {
            padding: 40px 20px;
        }

        .portfolio img {
            width: 90%;
            max-width: 300px;
            margin: 10px;
            border-radius: 10px;
        }

        footer {
            padding: 20px;
            background: #020617;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<header>
    <h1>SR Studio</h1>
    <p>Professional Graphic Design Services</p>
    <a href="https://instagram.com/sharprootstudio" class="btn">Contact Me</a>
</header>

<section class="section">
    <h2>My Services</h2>
    <p>Logo Design | Social Media Posts | Ad Banners</p>
</section>

<section class="section portfolio">
    <h2>My Work</h2>
    <img src="https://via.placeholder.com/300" alt="Design 1">
    <img src="https://via.placeholder.com/300" alt="Design 2">
</section>

<footer>
    <p>© 2026 SR Studio</p>
</footer>

</body>
</html>
